name: e2e

on:
  push:
    branches: ['*']

permissions:
  contents: read

jobs:
  upgrade-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Setup Flux Operator CLI
        uses: controlplaneio-fluxcd/flux-operator/actions/setup@c5505a455515f0ea78e04ff6f380cba8fe42a357 # v0.45.1
      - name: Setup Kubernetes Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
      - name: Install latest stable
        run: |
          helm install flux-operator oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator \
          --namespace flux-system \
          --create-namespace \
          --wait
      - name: Upgrade to current
        run: |
          helm upgrade flux-operator ./charts/flux-operator \
          --namespace flux-system \
          --wait
      - name: Deploy flux instance
        run: |
          helm install flux ./charts/flux-instance \
          --namespace flux-system \
          --set healthcheck.enabled=true \
          --wait
      - name: Check version
        run: |
          flux-operator version
