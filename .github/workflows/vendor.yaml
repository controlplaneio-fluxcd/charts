name: vendor

on:
  workflow_dispatch:
  schedule:
    - cron: '00 4 * * 1-5'

jobs:
  flux-mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for reading the configuration.
      packages: write # for pushing helm chart artifacts.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Flux Mirror CLI
        uses: fluxcd/flux-mirror/actions/setup@c5d300b42f30dac8091869763c049299b260805e # v0.0.1
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync charts
        run: flux-mirror sync -c sync/charts.yaml --no-progress --overwrite
